        sources:
          type: array
          items:
            $ref: "#/components/schemas/ChatSourceSchema"
          description: Source documents backing the answer (max 8, deduplicated)
        conversation_id:
          type: string
        intent:
          type: string
          nullable: true
          description: "Query classification: semantic_search, aggregation, filter_list, compliance_check, expiration_alert, vendor_lookup, comparison, general_knowledge"
        references:
          type: array
          items:
            $ref: "#/components/schemas/ChatReference"
          description: "Numbered references for inline citations. [N] in the answer text maps to references[N-1]."

