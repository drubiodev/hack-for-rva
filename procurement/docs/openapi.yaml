          type: string
          nullable: true

    ChatSourceSchema:
      type: object
      required: [document_id, relevance]
      properties:
        document_id:
          type: string
          format: uuid
        title:
          type: string
          nullable: true
        relevance:
          type: number
          description: "0.0-1.0 for normalized scores, >1.0 for Azure AI Search reranker scores"
        snippet:
          type: string
          nullable: true
          description: Extractive caption or document summary for tooltip display

    ChatReference:
      type: object
      required: [index, document_id]
      description: "Numbered reference cited inline in the answer as [1], [2], etc."
      properties:
        index:
          type: integer
          description: "Reference number used in the answer text (e.g., [1])"
        document_id:
          type: string
          format: uuid
        title:
          type: string
          nullable: true
        snippet:
          type: string
          nullable: true

    ChatResponse:
      type: object
      required: [answer, sources, conversation_id]
      properties:
        answer:
          type: string
