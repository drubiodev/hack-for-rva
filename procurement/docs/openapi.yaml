openapi: 3.1.0
info:
  title: Procurement Document Processing API
  description: >
    AI-powered procurement document processing for City of Richmond.
    Decision-support tool — AI-assisted, requires human review.
    Includes semantic search via Azure AI Search, intelligence analytics,
    configurable validation rules, and RAG-powered chatbot.
  version: 2.0.0

servers:
  - url: http://localhost:8000
    description: Local development

paths:
  /health:
    get:
      operationId: healthCheck
      summary: Health check
      tags: [System]
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 2.0.0

  # -----------------------------------------------------------------------
  # Documents
  # -----------------------------------------------------------------------

  /api/v1/documents:
    get:
      operationId: listDocuments
      summary: List documents with filters and pagination
      tags: [Documents]
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/DocumentStatus"
        - name: document_type
          in: query
          schema:
            $ref: "#/components/schemas/DocumentType"
        - name: source
          in: query
          schema:
            $ref: "#/components/schemas/DocumentSource"
        - name: department
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of documents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentListResponse"

  /api/v1/documents/upload:
    post:
      operationId: uploadDocument
      summary: Upload a PDF/image for processing
      tags: [Documents]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, uploaded_by]
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF, PNG, JPG, or TIFF file (max 100MB)
                uploaded_by:
                  type: string
                  description: Name of the analyst uploading
      responses:
        "202":
          description: Upload accepted, processing started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentSummary"
        "400":
          description: Invalid file type or size
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/documents/{id}:
    get:
      operationId: getDocument
      summary: Get document detail with fields, validations, and activity
      tags: [Documents]
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: Full document detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDetail"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/documents/{id}/file:
    get:
      operationId: getDocumentFile
      summary: Redirect to blob storage SAS URL for the original document
      tags: [Documents]
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "302":
          description: Redirect to blob URL
        "404":
          description: Document or blob not found

  /api/v1/documents/{id}/fields:
    patch:
      operationId: updateFields
      summary: Edit extracted fields (analyst only)
      tags: [Documents]
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FieldUpdate"
      responses:
        "200":
          description: Fields updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractedFields"

  /api/v1/documents/{id}/submit:
    post:
      operationId: submitForApproval
      summary: Submit document for supervisor approval (analyst only)
      tags: [Approvals]
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [submitted_by]
              properties:
                submitted_by:
                  type: string
      responses:
        "200":
          description: Submitted for approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentSummary"

  /api/v1/documents/{id}/approve:
    post:
      operationId: approveDocument
      summary: Approve a document (supervisor only)
      tags: [Approvals]
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [approved_by]
              properties:
                approved_by:
                  type: string
                comments:
                  type: string
      responses:
        "200":
          description: Document approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentSummary"

  /api/v1/documents/{id}/reject:
    post:
      operationId: rejectDocument
      summary: Reject a document (supervisor only)
      tags: [Approvals]
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rejected_by, reason]
              properties:
                rejected_by:
                  type: string
                reason:
                  type: string
      responses:
        "200":
          description: Document rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentSummary"

  /api/v1/documents/{id}/review:
    post:
      operationId: reviewDocument
      summary: Mark document as reviewed with notes
      tags: [Documents]
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reviewed_by, role]
              properties:
                reviewed_by:
                  type: string
                role:
                  type: string
                  enum: [analyst, supervisor]
                notes:
                  type: string
      responses:
        "200":
          description: Document reviewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentSummary"

  /api/v1/documents/{id}/export/csv:
    get:
      operationId: exportDocumentCsv
      summary: Export extracted fields as CSV
      tags: [Documents]
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string
                format: binary
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/documents/{id}/resolve-warning:
    post:
      operationId: resolveWarning
      summary: Resolve a validation warning
      tags: [Documents]
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [validation_id, resolved_by]
              properties:
                validation_id:
                  type: string
                  format: uuid
                resolved_by:
                  type: string
      responses:
        "200":
          description: Warning resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationResult"

  /api/v1/documents/{id}/reprocess:
    post:
      operationId: reprocessDocument
      summary: Re-run AI pipeline on document (supervisor only)
      tags: [Documents]
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [requested_by]
              properties:
                requested_by:
                  type: string
      responses:
        "202":
          description: Reprocessing started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentSummary"

  # -----------------------------------------------------------------------
  # Annotations
  # -----------------------------------------------------------------------

  /api/v1/documents/{id}/annotations:
    get:
      operationId: getAnnotations
      summary: Get all annotations for a document
      tags: [Annotations]
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      responses:
        "200":
          description: List of annotations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AnnotationResponse"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createAnnotation
      summary: Add an annotation to a document
      tags: [Annotations]
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnotationCreate"
      responses:
        "201":
          description: Annotation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnnotationResponse"
        "404":
          description: Document not found

  # -----------------------------------------------------------------------
  # Reminders
  # -----------------------------------------------------------------------

  /api/v1/documents/{id}/reminders:
    post:
      operationId: createReminder
      summary: Create a renewal reminder for a document
      tags: [Reminders]
      parameters:
        - $ref: "#/components/parameters/DocumentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReminderCreateRequest"
      responses:
        "201":
          description: Reminder created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reminder"
        "404":
          description: Document not found

  /api/v1/reminders:
    get:
      operationId: listReminders
      summary: List contract reminders
      tags: [Reminders]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, triggered, dismissed]
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of reminders
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Reminder"

  /api/v1/reminders/{id}:
    patch:
      operationId: updateReminder
      summary: Update reminder status (e.g. dismiss)
      tags: [Reminders]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReminderUpdateRequest"
      responses:
        "200":
          description: Reminder updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reminder"
        "404":
          description: Reminder not found

  # -----------------------------------------------------------------------
  # Analytics
  # -----------------------------------------------------------------------

  /api/v1/analytics/summary:
    get:
      operationId: getAnalyticsSummary
      summary: KPI summary (total docs, by type, total value)
      tags: [Analytics]
      responses:
        "200":
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsSummary"

  /api/v1/analytics/risks:
    get:
      operationId: getRisks
      summary: Expiring contracts and risk alerts
      tags: [Analytics]
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 90
      responses:
        "200":
          description: Risk data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskSummary"

  # -----------------------------------------------------------------------
  # Intelligence (Azure AI Search powered)
  # -----------------------------------------------------------------------

  /api/v1/intelligence/department-spend:
    get:
      operationId: intelligenceDepartmentSpend
      summary: Aggregated contract spend by department
      tags: [Intelligence]
      responses:
        "200":
          description: Department spend breakdown
          content:
            application/json:
              schema:
                type: object
                properties:
                  departments:
                    type: array
                    items:
                      $ref: "#/components/schemas/DepartmentSpend"

  /api/v1/intelligence/expiring:
    get:
      operationId: intelligenceExpiring
      summary: Documents expiring within N days
      tags: [Intelligence]
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 90
            minimum: 1
            maximum: 365
      responses:
        "200":
          description: Expiring documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  documents:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExpiringDocument"
                  days:
                    type: integer
                  count:
                    type: integer

  /api/v1/intelligence/compliance-gaps:
    get:
      operationId: intelligenceComplianceGaps
      summary: Documents with missing compliance fields (high-value contracts)
      tags: [Intelligence]
      responses:
        "200":
          description: Compliance gap list
          content:
            application/json:
              schema:
                type: object
                properties:
                  gaps:
                    type: array
                    items:
                      $ref: "#/components/schemas/ComplianceGap"
                  count:
                    type: integer

  /api/v1/intelligence/vendor-concentration:
    get:
      operationId: intelligenceVendorConcentration
      summary: Vendors with multiple contracts — concentration risk
      tags: [Intelligence]
      responses:
        "200":
          description: Vendor concentration data
          content:
            application/json:
              schema:
                type: object
                properties:
                  vendors:
                    type: array
                    items:
                      $ref: "#/components/schemas/VendorConcentration"
                  count:
                    type: integer

  /api/v1/intelligence/sole-source-review:
    get:
      operationId: intelligenceSoleSourceReview
      summary: Sole-source contracts above a dollar threshold
      tags: [Intelligence]
      parameters:
        - name: threshold
          in: query
          schema:
            type: number
            default: 50000
      responses:
        "200":
          description: Sole-source contracts for review
          content:
            application/json:
              schema:
                type: object
                properties:
                  documents:
                    type: array
                    items:
                      $ref: "#/components/schemas/IntelligenceDocument"
                  threshold:
                    type: number
                  count:
                    type: integer

  # -----------------------------------------------------------------------
  # Chat (RAG-powered with Azure AI Search + SQL intelligence)
  # -----------------------------------------------------------------------

  /api/v1/chat:
    post:
      operationId: chat
      summary: Ask questions about procurement documents using AI query routing + semantic search
      description: >
        Routes questions through an AI intent classifier, then dispatches to
        Azure AI Search (semantic), SQL aggregation, or SQL filtering.
        Returns a markdown-formatted answer with numbered inline citations [1], [2]
        that map to the references array.
      tags: [Chat]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Chat response with answer, source documents, and inline references
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  # -----------------------------------------------------------------------
  # Activity
  # -----------------------------------------------------------------------

  /api/v1/activity:
    get:
      operationId: getActivity
      summary: Recent activity log across all documents
      tags: [Activity]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Activity entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ActivityEntry"

  # -----------------------------------------------------------------------
  # Validation Rules (configurable policy engine)
  # -----------------------------------------------------------------------

  /api/v1/validation-rules:
    get:
      operationId: listValidationRules
      summary: List all validation rules with optional filters
      tags: [Validation Rules]
      parameters:
        - name: scope
          in: query
          schema:
            type: string
            enum: [global, department]
        - name: department
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, deprecated]
        - name: enabled
          in: query
          schema:
            type: boolean
        - name: rule_type
          in: query
          schema:
            type: string
            enum: [threshold, required_field, semantic_policy, district_check, date_window]
      responses:
        "200":
          description: List of validation rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ValidationRuleConfig"

    post:
      operationId: createValidationRule
      summary: Create a new validation rule (supervisor only)
      tags: [Validation Rules]
      parameters:
        - $ref: "#/components/parameters/SupervisorRole"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidationRuleConfigCreate"
      responses:
        "201":
          description: Rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationRuleConfig"

  /api/v1/validation-rules/compliance-summary:
    get:
      operationId: getComplianceSummary
      summary: Department-level compliance aggregates, top triggered rules, recent violations
      tags: [Validation Rules]
      responses:
        "200":
          description: Compliance summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ComplianceSummary"

  /api/v1/validation-rules/audit-log:
    get:
      operationId: getGlobalAuditLog
      summary: Global audit log across all validation rules
      tags: [Validation Rules]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated audit log
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ValidationRuleAuditLog"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer

  /api/v1/validation-rules/{rule_id}:
    patch:
      operationId: updateValidationRule
      summary: Update a validation rule (supervisor only)
      tags: [Validation Rules]
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/SupervisorRole"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidationRuleConfigUpdate"
      responses:
        "200":
          description: Rule updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationRuleConfig"

    delete:
      operationId: deleteValidationRule
      summary: Delete a validation rule (hard-delete for draft, soft-deprecate for active)
      tags: [Validation Rules]
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/SupervisorRole"
      responses:
        "200":
          description: Rule deleted or deprecated
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string

  /api/v1/validation-rules/{rule_id}/toggle:
    post:
      operationId: toggleValidationRule
      summary: Toggle a rule's enabled flag (supervisor only)
      tags: [Validation Rules]
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/SupervisorRole"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                toggled_by:
                  type: string
      responses:
        "200":
          description: Rule toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationRuleConfig"

  /api/v1/validation-rules/{rule_id}/activate:
    post:
      operationId: activateValidationRule
      summary: Move a rule from draft to active (supervisor only)
      tags: [Validation Rules]
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/SupervisorRole"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                activated_by:
                  type: string
      responses:
        "200":
          description: Rule activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationRuleConfig"

  /api/v1/validation-rules/{rule_id}/deprecate:
    post:
      operationId: deprecateValidationRule
      summary: Move a rule from active to deprecated (supervisor only)
      tags: [Validation Rules]
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/SupervisorRole"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                deprecated_by:
                  type: string
      responses:
        "200":
          description: Rule deprecated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationRuleConfig"

  /api/v1/validation-rules/{rule_id}/audit-log:
    get:
      operationId: getRuleAuditLog
      summary: Audit log entries for a specific validation rule
      tags: [Validation Rules]
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Rule audit log
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/ValidationRuleAuditLog"

  # -----------------------------------------------------------------------
  # Admin (search index management)
  # -----------------------------------------------------------------------

  /api/v1/admin/reindex:
    post:
      operationId: adminReindex
      summary: Recreate search index and reindex all documents (supervisor only)
      tags: [Admin]
      parameters:
        - $ref: "#/components/parameters/SupervisorRole"
      responses:
        "200":
          description: Reindex complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "Reindex complete: 1375 documents indexed"

  /api/v1/admin/ensure-index:
    post:
      operationId: adminEnsureIndex
      summary: Create or update the Azure AI Search index schema
      tags: [Admin]
      responses:
        "200":
          description: Index created/updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "Index 'contracts' created/updated"

  # -----------------------------------------------------------------------
  # Ingest
  # -----------------------------------------------------------------------

  /api/v1/ingest/socrata:
    post:
      operationId: ingestSocrata
      summary: Import Socrata CSV into documents table
      tags: [Ingest]
      responses:
        "200":
          description: Ingest complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported:
                    type: integer
                  skipped:
                    type: integer
                  message:
                    type: string

  /api/v1/ingest/backfill-intelligence:
    post:
      operationId: backfillIntelligence
      summary: Backfill intelligence fields on existing documents using AI
      tags: [Ingest]
      responses:
        "200":
          description: Backfill complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  processed:
                    type: integer
                  skipped:
                    type: integer
                  errors:
                    type: integer

# =========================================================================
# Components
# =========================================================================

components:
  parameters:
    DocumentId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    SupervisorRole:
      name: X-User-Role
      in: header
      required: true
      schema:
        type: string
        enum: [supervisor]
      description: Must be "supervisor" for protected operations

  schemas:
    # --- Enums ---

    DocumentStatus:
      type: string
      enum:
        - uploading
        - ocr_complete
        - classified
        - extracted
        - analyst_review
        - pending_approval
        - approved
        - rejected
        - error

    DocumentType:
      type: string
      enum: [rfp, rfq, contract, purchase_order, invoice, amendment, cooperative, other]

    DocumentSource:
      type: string
      enum: [upload, socrata, sam_gov, eva]

    # --- Documents ---

    DocumentSummary:
      type: object
      required: [id, filename, status, source, created_at]
      properties:
        id:
          type: string
          format: uuid
        filename:
